<div class="min-h-screen bg-gray-50 scroll-smooth">

  <!-- Page Header -->
  <div class="sticky top-0 z-40 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
    <div class="flex flex-col">
      <h1 class="text-lg font-semibold text-gray-900">Users</h1>
      <div class="mt-1 text-sm text-gray-600">
        Manage system users, their roles and access
      </div>
    </div>
  </div>

  <div class="p-6">
    <app-card variant="flat" size="lg">

      <!-- Toolbar -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-base font-semibold text-gray-800">User List</h2>
        <div class="flex items-center gap-2">
          <app-export-excel
            [data]="userData"
            [columns]="exportColumns"
            [config]="{ fileName: 'users', buttonLabel: 'Export to Excel', variant: 'outline', size: 'sm' }"
          ></app-export-excel>
          <app-button variant="primary" size="sm" (click)="openCreateModal()">+ New User</app-button>
        </div>
      </div>

      <!-- Loading -->
      <div *ngIf="isLoading" class="flex items-center justify-center py-12">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <span class="ml-3 text-gray-500 text-sm">Loading...</span>
      </div>

      <!-- Table -->
      <app-table
        *ngIf="!isLoading"
        [columns]="tableColumns"
        [rows]="userData"
        [config]="tableConfig"
        (rowClick)="onRowClick($event)"
        (pageChange)="onPageChange($event)"
      >

        <!-- Password — always masked -->
        <ng-template appTableCell="password" let-value>
          <span class="text-gray-400 tracking-widest text-sm font-mono">••••••••••</span>
        </ng-template>

        <!-- User Type badge -->
        <ng-template appTableCell="usertype" let-value>
          <app-badge
            size="sm"
            [rounded]="true"
            [variant]="value === 'provider' ? 'primary' : 'secondary'"
          >
            {{ value }}
          </app-badge>
        </ng-template>

        <!-- Status badge -->
        <ng-template appTableCell="userstatus" let-value>
          <app-badge
            size="sm"
            [rounded]="true"
            [variant]="value === 'active' ? 'success' : 'warning'"
          >
            {{ value }}
          </app-badge>
        </ng-template>

        <!-- Actions -->
        <ng-template appTableCell="actions" let-row="row">
          <div class="flex items-center justify-center">
            <button
              type="button"
              (click)="onDelete(row); $event.stopPropagation()"
              class="inline-flex items-center justify-center h-8 w-8 rounded-md text-red-500 hover:bg-red-50 hover:text-red-700 transition"
              title="Delete User"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          </div>
        </ng-template>

      </app-table>
    </app-card>
  </div>

</div>


<!-- Create User Modal -->
<app-modal
  [isOpen]="isModalOpen"
  [config]="{ title: 'Create New User', size: 'md', showCloseButton: true, closeOnBackdropClick: true }"
  (closeModal)="closeModal()"
>
  <form [formGroup]="form">
    <div class="grid grid-cols-1 gap-4">

      <app-input
        size="sm"
        label="Email"
        formControlName="email"
        type="email"
        placeholder="e.g. user@example.com"
        [required]="true"
        [fullWidth]="true"
        [errorText]="form.get('email')?.touched && form.get('email')?.hasError('required') ? 'Email is required'
          : form.get('email')?.touched && form.get('email')?.hasError('email') ? 'Enter a valid email address' : ''"
      ></app-input>

      <app-input
        size="sm"
        label="Name"
        formControlName="name"
        placeholder="Full name"
        [required]="true"
        [fullWidth]="true"
        [errorText]="form.get('name')?.touched && form.get('name')?.hasError('required') ? 'Name is required' : ''"
      ></app-input>

      <app-input
        size="sm"
        label="Password"
        formControlName="password"
        type="password"
        placeholder="Enter password"
        [required]="true"
        [fullWidth]="true"
        helperText="Password will be stored as a SHA-1 hash"
        [errorText]="form.get('password')?.touched && form.get('password')?.hasError('required') ? 'Password is required' : ''"
      ></app-input>

      <app-select
        size="sm"
        label="User Type"
        formControlName="usertype"
        placeholder="Select user type"
        [required]="true"
        [options]="userTypeOptions"
      ></app-select>

    </div>
  </form>

  <div modal-footer class="flex gap-3">
    <app-button variant="secondary" (click)="closeModal()" [disabled]="isSaving">Cancel</app-button>
    <app-button variant="primary" (click)="saveUser()" [disabled]="isSaving">
      <span *ngIf="!isSaving">Create User</span>
      <span *ngIf="isSaving" class="flex items-center gap-2">
        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
        Creating...
      </span>
    </app-button>
  </div>
</app-modal>
