<div class="min-h-screen bg-gray-50">

  <!-- ── STICKY HEADER ── -->
  <div class="sticky top-0 z-40 bg-white border-b border-gray-200 px-6 py-3">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-lg font-semibold text-gray-900">Card Types</h1>
        <p class="text-sm text-gray-500 mt-0.5">
          <span class="font-semibold text-gray-700">{{ cards.length }}</span> card types
          &nbsp;·&nbsp; Click a row to manage cards
        </p>
      </div>
      <app-button variant="primary" size="sm" icon="M12 4.5v15m7.5-7.5h-15" (clicked)="openAddModal()">
        Add Card Type
      </app-button>
    </div>
  </div>

  <!-- ── TABLE ── -->
  <div class="p-6">
    <app-card variant="flat" size="lg">
      <app-table
        [columns]="tableColumns"
        [rows]="cards"
        [config]="tableConfig"
        (rowClick)="onRowClick($event)"
        (pageChange)="onPageChange($event)"
      >
        <!-- Image thumbnail -->
        <ng-template appTableCell="imagepath" let-value>
          <div class="flex items-center">
            <img *ngIf="value" [src]="value" alt="Card image"
              class="h-16 w-30 object-contain rounded border border-gray-200">
            <div *ngIf="!value"
              class="h-16 w-30 rounded border-2 border-dashed border-gray-200 flex items-center justify-center">
              <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
              </svg>
            </div>
          </div>
        </ng-template>

        <!-- Primary badge -->
        <ng-template appTableCell="PrimaryCard" let-value>
          <app-badge size="sm" [rounded]="true" [variant]="getPrimaryVariant(value)">
            {{ value || '—' }}
          </app-badge>
        </ng-template>

        <!-- Actions -->
        <ng-template appTableCell="actions" let-row="row">
          <button
            type="button"
            (click)="onDelete(row); $event.stopPropagation()"
            class="inline-flex items-center justify-center p-2 rounded-md text-red-600 hover:bg-red-50 hover:text-red-700 transition"
            title="Delete card type"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
            </svg>
          </button>
        </ng-template>
      </app-table>
    </app-card>
  </div>

</div>

<!-- ── ADD MODAL ── -->
<app-modal
  [isOpen]="showAddModal"
  [config]="{ title: 'Add Card Type', size: 'sm', showCloseButton: true }"
  (closeModal)="closeAddModal()"
>
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">
        Card Type <span class="text-red-500">*</span>
      </label>
      <app-input [(ngModel)]="newCardType" placeholder="e.g. GOLD"></app-input>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
      <app-input [(ngModel)]="newDescription" placeholder="Optional description"></app-input>
    </div>
  </div>

  <div modal-footer class="flex justify-end gap-2">
    <app-button variant="secondary" size="sm" (clicked)="closeAddModal()">Cancel</app-button>
    <app-button variant="primary" size="sm" [disabled]="isCreating || !newCardType.trim()" (clicked)="createCard()">
      <svg *ngIf="isCreating" class="animate-spin h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      {{ isCreating ? 'Creating…' : 'Create' }}
    </app-button>
  </div>
</app-modal>
