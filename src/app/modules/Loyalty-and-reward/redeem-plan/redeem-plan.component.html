<div class="min-h-screen bg-gray-50">

  <!-- ══════════════════════════════════════════════════
       PAGE HEADER
  ══════════════════════════════════════════════════ -->
  <div class="sticky top-0 z-40 bg-white border-b border-gray-200 px-6 py-3">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-lg font-semibold text-gray-900">Redeem Plans</h1>
        <p class="text-sm text-gray-500 mt-0.5">Manage and browse all redeem plans</p>
      </div>

      <div class="flex items-center gap-3">
        <app-export-excel
          [data]="plans"
          [columns]="exportColumns"
          [config]="{ fileName: 'redeem-plans', buttonLabel: 'Export', variant: 'outline', size: 'sm' }"
        ></app-export-excel>

        <app-button
          variant="primary"
          size="md"
          icon="M12 4.5v15m7.5-7.5h-15"
          (clicked)="openAddModal()"
        >
          Add Redeem Plan
        </app-button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════════════ -->
  <div class="p-6">
    <app-card variant="flat" size="lg">

      <app-table
        [columns]="tableColumns"
        [rows]="plans"
        [config]="tableConfig"
        (rowClick)="onRowClick($event)"
        (pageChange)="onPageChange($event)"
      >

        <!-- Code — clickable link -->
        <ng-template appTableCell="Code" let-value let-row="row">
          <button
            (click)="onRowClick(row)"
            class="text-sm font-semibold text-blue-600 hover:text-blue-800 hover:underline transition-colors"
          >
            {{ value }}
          </button>
        </ng-template>

        <!-- Active Date -->
        <ng-template appTableCell="ActiveDate" let-value>
          <span class="text-sm" [class.text-gray-400]="!value">{{ value || '—' }}</span>
        </ng-template>

        <!-- Expiry Date -->
        <ng-template appTableCell="ExpirayDate" let-value>
          <span class="text-sm" [class.text-gray-400]="!value">{{ value || '—' }}</span>
        </ng-template>

        <!-- Status badge -->
        <ng-template appTableCell="PlanStatus" let-value>
          <app-badge size="sm" [rounded]="true" [variant]="getStatusVariant(value)">
            {{ value || '—' }}
          </app-badge>
        </ng-template>

        <!-- Actions -->
        <ng-template appTableCell="actions" let-row="row">
          <div class="flex items-center gap-1">
            <button
              type="button"
              (click)="onRowClick(row)"
              class="inline-flex items-center justify-center p-2 rounded-md text-gray-500
                     hover:bg-blue-50 hover:text-blue-600 transition-colors"
              title="Open redeem plan"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0
                  01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/>
              </svg>
            </button>
            <button
              type="button"
              (click)="onDelete(row); $event.stopPropagation()"
              class="inline-flex items-center justify-center p-2 rounded-md text-red-500
                     hover:bg-red-50 hover:text-red-700 transition-colors"
              title="Delete redeem plan"
            >
              <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16
                  19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456
                  0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0
                  013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32
                  0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
              </svg>
            </button>
          </div>
        </ng-template>

      </app-table>
    </app-card>
  </div>

</div>

<!-- ══════════════════════════════════════════════════
     ADD REDEEM PLAN MODAL
══════════════════════════════════════════════════ -->
<app-modal
  [isOpen]="showAddModal"
  [config]="addModalConfig"
  (closeModal)="closeAddModal()"
>
  <div class="space-y-4">
    <p class="text-sm text-gray-500">
      Enter a redeem code to create a new redeem plan. You will be taken to the
      details page to configure it further.
    </p>

    <app-input
      label="Redeem Code"
      placeholder="e.g. GR1"
      [required]="true"
      [fullWidth]="true"
      [(ngModel)]="newRedeemCode"
    ></app-input>
  </div>

  <div modal-footer class="flex gap-3">
    <app-button variant="ghost" size="sm" (clicked)="closeAddModal()">Cancel</app-button>
    <app-button
      variant="primary"
      size="sm"
      [loading]="isCreating"
      [disabled]="!newRedeemCode.trim()"
      (clicked)="createRedeemPlan()"
    >
      Create Plan
    </app-button>
  </div>
</app-modal>
