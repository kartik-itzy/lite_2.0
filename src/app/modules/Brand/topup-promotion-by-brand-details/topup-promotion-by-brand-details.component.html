<app-page-header
  [breadcrumbs]="breadcrumbItems"
  [title]="brandId"
></app-page-header>

<div class="p-6">
  <app-card variant="flat" size="lg" class="h-full">
    <app-table
      *ngIf="!isLoading"
      [rows]="topupPromotionDataSource"
      [config]="tableConfig"
      [columns]="tableColumns"
    >
      <ng-template appTableCell="OtherInfo" let-value let-row="row">
        <button
          type="button"
          class="inline-flex items-center justify-center p-2 rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-700 transition"
          title="Delete Brand"
        >
          <!-- Heroicon: Trash -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"
            />
          </svg>
        </button>
      </ng-template>

      <ng-template appTableCell="Actions" let-value let-row="row">
        <button
          type="button"
          (click)="onDeleteBrand(row, $event)"
          class="inline-flex items-center justify-center p-2 rounded-md text-red-600 hover:bg-red-50 hover:text-red-700 transition"
          title="Delete Brand"
        >
          <!-- Heroicon: Trash -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
            />
          </svg>
        </button>
      </ng-template>

      <ng-template appTableCell="Activate" let-value>
        <app-badge size="sm" [rounded]="true" [variant]="value === 'OPEN' ? 'success' : 'danger'">
          {{ value }}
        </app-badge>
      </ng-template>
      <ng-template appTableCell="ActiveDate" let-value>
        {{ value | date: "d MMM yy" }}
      </ng-template>
      <ng-template appTableCell="ExpiryDate" let-value>
        {{ value | date: "d MMM yy" }}
      </ng-template>
    </app-table>
    <app-loading *ngIf="isLoading"></app-loading>
  </app-card>
</div>
