<div class="min-h-screen bg-gray-50">

  <!-- ── STICKY HEADER — driven by route context ── -->
  <div class="sticky top-0 z-40 bg-white border-b border-gray-200 px-6 py-3">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-lg font-semibold text-gray-900">{{ ctx.title }}</h1>
        <p class="text-sm text-gray-500 mt-0.5">
          <span class="font-semibold text-gray-700">{{ brands.length }}</span> brands
          &nbsp;·&nbsp; {{ ctx.subtitle }}
        </p>
      </div>

      <!-- Only shown on the main Brands management screen -->
      <app-button
        *ngIf="ctx.showCreate"
        variant="primary"
        size="sm"
        icon="M12 4.5v15m7.5-7.5h-15"
        (clicked)="openAddBrandModal()"
      >
        Create Brand
      </app-button>
    </div>
  </div>

  <!-- ── TABLE ── -->
  <div class="p-6">
    <app-loading *ngIf="isLoading"></app-loading>

    <app-card *ngIf="!isLoading" variant="flat" size="lg">
      <app-table
        [columns]="tableColumns"
        [rows]="brands"
        [config]="tableConfig"
        (rowClick)="onRowClick($event)"
      >

        <!-- Logo thumbnail -->
        <ng-template appTableCell="imagepath" let-value>
          <div class="flex items-center">
            <img *ngIf="value" [src]="value" alt="Brand logo" loading="lazy"
              class="h-10 w-14 object-contain rounded border border-gray-200">
            <div *ngIf="!value"
              class="h-10 w-14 rounded border-2 border-dashed border-gray-200 flex items-center justify-center">
              <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          </div>
        </ng-template>

        <!-- Status badge -->
        <ng-template appTableCell="status" let-value>
          <app-badge size="sm" [rounded]="true" [variant]="getStatusVariant(value)">
            {{ value || '—' }}
          </app-badge>
        </ng-template>

        <!-- Points ratio — display as 1:X -->
        <ng-template appTableCell="pointsratio" let-value>
          <span *ngIf="value" class="text-sm font-mono text-gray-700">
            1 : {{ (1 / value) | number:'1.0-2' }}
          </span>
          <span *ngIf="!value" class="text-gray-400 text-sm">—</span>
        </ng-template>

        <!-- Delete action — only rendered when actions column is present (Brand screen) -->
        <ng-template appTableCell="actions" let-row="row">
          <button
            type="button"
            (click)="onDeleteBrand(row, $event)"
            class="inline-flex items-center justify-center p-2 rounded-md text-red-600 hover:bg-red-50 hover:text-red-700 transition"
            title="Delete brand"
          >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
            </svg>
          </button>
        </ng-template>

      </app-table>
    </app-card>
  </div>

</div>

<!-- ══ ADD BRAND MODAL — only reachable when ctx.showCreate is true ══ -->
<app-modal
  [isOpen]="isModalOpen"
  [config]="{ title: 'Create Brand', size: 'sm', showCloseButton: true, closeOnBackdropClick: true }"
  (closeModal)="closeModal()"
>
  <form [formGroup]="brandForm" (ngSubmit)="addBrand()" novalidate>
    <div class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          Brand Code <span class="text-red-500">*</span>
        </label>
        <app-input formControlName="brand_id" placeholder="e.g. NIKE" size="sm"></app-input>
        <p *ngIf="fieldInvalid('brand_id')" class="mt-1 text-xs text-red-500">Brand code is required</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">
          Brand Name <span class="text-red-500">*</span>
        </label>
        <app-input formControlName="name" placeholder="e.g. Nike" size="sm"></app-input>
        <p *ngIf="fieldInvalid('name')" class="mt-1 text-xs text-red-500">Brand name is required</p>
      </div>

    </div>
  </form>

  <div modal-footer class="flex justify-end gap-2">
    <app-button variant="secondary" size="sm" [disabled]="isSubmitting" (clicked)="closeModal()">
      Cancel
    </app-button>
    <app-button variant="primary" size="sm" [disabled]="isSubmitting" (clicked)="addBrand()">
      <svg *ngIf="isSubmitting" class="animate-spin h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      {{ isSubmitting ? 'Creating…' : 'Create' }}
    </app-button>
  </div>
</app-modal>
