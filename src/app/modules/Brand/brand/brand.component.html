<div class="min-h-screen bg-gray-50 scroll-smooth">
  <!-- Header Section -->
  <div class="sticky top-0 z-40 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
    <div class="flex space-x-4 justify-between w-full">
      <div class="flex flex-col">
        <h1 class="text-lg font-semibold text-gray-900">Brands List</h1>
        <div class="mt-3 text-sm text-gray-600">
          All the brands are listed here you can check it out, create or delete the brand add info etc.
        </div>
      </div>
      <div class="flex justify-center items-center">
        <app-button (clicked)="openAddBrandModal()">Create Brand</app-button>
      </div>
    </div>

  </div>

  <div class="px-6 pt-4 max-w-full">
    <app-table *ngIf="!isLoading" [columns]="tableColumns" [rows]="brandDataSource" [config]="tableConfig" (rowClick)="onRowClick($event)">
      <ng-template appTableCell="imagepath" let-value let-row="row">
        <div class="flex  ">
          <img *ngIf="value" [src]="value" alt="level-image" loading="lazy"
            class="h-12 w-16 object-contain rounded-md border" (click)="$event.stopPropagation()" />
          <span *ngIf="!value" class="text-gray-400 text-sm">No Image</span>
        </div>
      </ng-template>
      <ng-template appTableCell="actions" let-row="row">
        <button type="button" (click)="onDeleteBrand(row, $event)" class="inline-flex items-center justify-center p-2 rounded-md
               text-red-600 hover:bg-red-50 hover:text-red-700 transition" title="Delete Brand">
          <!-- Heroicon: Trash -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />

          </svg>
        </button>
      </ng-template>

    </app-table>
    <app-loading *ngIf="isLoading"></app-loading>
  </div>
</div>

<app-modal [isOpen]="isModalOpen" [config]="{
    title: 'Add New Brand',
    size: 'md',
    showCloseButton: true,
    closeOnBackdropClick: true
  }" (closeModal)="closeModal()">
  <div [formGroup]="brandDetailsForm" class="flex gap-3">
    <app-input size="sm" formControlName="name" label="Brand Name" placeholder="Enter brand Name"></app-input>
    <app-input size="sm" formControlName="brand_id" label="Brand Code" placeholder="Enter brand code"></app-input>
  </div>

  <div modal-footer class="gap-4">
    <app-button [variant]="'primary'" (clicked)="addBrand()">
      Save
    </app-button>
  </div>
</app-modal>
