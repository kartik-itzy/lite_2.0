<div class="min-h-screen bg-gray-50 scroll-smooth">
  <!-- Header Section -->
  <div
    class="sticky top-0 z-40 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between"
  >
    <div class="flex space-x-4 justify-between w-full">
      <div class="flex flex-col">
        <h1 class="text-lg font-semibold text-gray-900">
          App Promotion by brand
        </h1>
        <div class="mt-3 text-sm text-gray-600">
          Can create app promotion by brand details and schedule
        </div>
      </div>
      <div class="flex justify-center items-center">
        <app-button (clicked)="addAppPromotion()">Create app Promo</app-button>
      </div>
    </div>
  </div>

  <div class="px-6 pt-4 max-w-full">
    <div *ngIf="!isLoading">
      <app-table
        [columns]="tableColumns"
        [rows]="appPromotionDataSource"
        [config]="tableConfig"
        (rowClick)="onRowClick($event)"
      >
        <ng-template appTableCell="imagepath" let-value let-row="row">
          <div class="flex items-center justify-center">
            <img
              *ngIf="value"
              [src]="value"
              alt="level-image"
              loading="lazy"
              class="h-12 w-16 object-contain rounded-md border"
              (click)="$event.stopPropagation()"
            />
            <span *ngIf="!value" class="text-gray-400 text-sm">No Image</span>
          </div>
        </ng-template>
        <ng-template appTableCell="actions" let-row="row">
          <button
            type="button"
            (click)="onEdit(row); $event.stopPropagation()"
            class="inline-flex items-center justify-center h-8 w-8 rounded-md text-blue-600 hover:bg-blue-50 hover:text-blue-700 transition"
            title="Edit Brand"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875
                  0 1 1 2.652 2.652L6.832 19.82
                  a4.5 4.5 0 0 1-1.897 1.13l-2.685.8
                  .8-2.685a4.5 4.5 0 0 1 1.13-1.897
                  L16.863 4.487Z"
              />
            </svg>
          </button>
          <button
            type="button"
            (click)="onDeleteAppPromotion(row, $event)"
            class="inline-flex items-center justify-center p-2 rounded-md text-red-600 hover:bg-red-50 hover:text-red-700 transition"
            title="Delete Brand"
          >
            <!-- Heroicon: Trash -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
              />
            </svg>
          </button>
        </ng-template>
      </app-table>
    </div>

    <app-loading *ngIf="isLoading"></app-loading>
  </div>
</div>
